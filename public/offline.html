<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Mershal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0E12;
      color: #F0F0F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(94,106,210,0.1);
      border: 1px solid rgba(94,106,210,0.2);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #F0F0F5;
    }
    p {
      font-size: 0.875rem;
      color: #8B8FA8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #5E6AD2;
      color: white;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌐</div>
    <h1>You're offline</h1>
    <p>
      Mershal needs an internet connection to work.<br />
      Please check your connection and try again.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
